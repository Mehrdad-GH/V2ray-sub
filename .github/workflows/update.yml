name: Update V2Ray Subscription

on:
  schedule:
    - cron: '0 */3 * * *'   # هر ۳ ساعت
  workflow_dispatch: {}       # اجرای دستی از تب Actions

permissions:
  contents: write

concurrency:
  group: update-sub
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run scraper
        env:
          CHANNELS: ${{ vars.CHANNELS }}
          TOTAL_LIMIT: ${{ vars.TOTAL_LIMIT }}
          MAX_PAGES_PER_CHANNEL: ${{ vars.MAX_PAGES_PER_CHANNEL || '15' }}
          SUB_FILENAME: ${{ vars.SUB_FILENAME || 'sub.txt' }}
        run: npm run update

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sub/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update configs [skip ci]"
            git push
          fi
